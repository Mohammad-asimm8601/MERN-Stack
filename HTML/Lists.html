<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists in html</title>
</head>
<body>
    <!-- Unorderd list -->
     <h2>Breakfast</h2>
     <ul>
        <li>Bread</li>
        <li>Better</li>
        <li>Banana</li>
        <li>Jam</li>
        <li>Breakfast</li>
     </ul>

     <!-- ordered list -->
      <h2>Name of Students</h2>
      <ol>
        <li>Asim</li>
        <li>Shanawaz</li>
        <li>Shahbaz</li>
        <li>Ranu</li>
      </ol>
</body>
</html>
