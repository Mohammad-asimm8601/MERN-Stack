<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables in HTML</title>
</head>
<body>
    <table border="black">
        <caption>Fruits Menu</caption>
        <tr>
            <th>Items</th>
            <th>Price</th>
        </tr>
        <tr>
            <td>Mango</td>
            <td>50</td>
        </tr>
        <tr>
            <td>Apple</td>
            <td>180</td>
        </tr>
        <tr>
            <td>Cherry</td>
            <td>80</td>
        </tr>
    </table>
</body>
</html>
